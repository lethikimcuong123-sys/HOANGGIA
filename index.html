<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hoàng Gia TV - Hệ Thống Video & Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* --- PHẦN GIAO DIỆN CHÍNH --- */
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: #000 url('/static/bg_main.jpg') no-repeat center center fixed; 
            background-size: cover; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; 
        }
        header { background: rgba(0,0,0,0.7); padding: 20px; text-align: center; border-bottom: 2px solid #0084ff; }
        h1 { margin: 0; color: #0084ff; text-transform: uppercase; letter-spacing: 2px; }

        /* --- GRID VIDEO 4 CỘT - 2 HÀNG --- */
        .video-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; 
            max-width: 1300px; margin: 40px auto; padding: 0 20px; 
        }
        .video-card { 
            background: rgba(255, 255, 255, 0.95); border-radius: 15px; 
            overflow: hidden; color: #222; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: transform 0.3s;
        }
        .video-card:hover { transform: translateY(-10px); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; display: block; object-fit: cover; }
        .video-title { padding: 15px; font-weight: bold; text-align: center; font-size: 15px; border-top: 1px solid #ddd; }

        /* --- HỆ THỐNG CHAT --- */
        #chat-trigger { 
            position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; 
            background: #0084ff; border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; cursor: pointer; font-size: 35px; z-index: 1000; 
            box-shadow: 0 5px 20px rgba(0,132,255,0.5); 
        }
        #chat-overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 2000; justify-content: center; align-items: center; 
        }
        #chat-window { 
            width: 900px; height: 85vh; background: #fff; border-radius: 20px; 
            display: flex; color: #333; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        /* Sidebar cho hoanggia123 */
        #chat-sidebar { width: 250px; background: #f8f9fa; border-right: 1px solid #eee; overflow-y: auto; }
        .user-tab { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .user-tab:hover, .user-tab.active { background: #0084ff; color: #fff; }

        /* Khu vực nhắn tin */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; }#message-display { flex: 1; overflow-y: auto; padding: 20px; background: #f0f2f5; display: flex; flex-direction: column; gap: 12px; }
        
        /* Bong bóng tin nhắn */
        .msg-bubble { padding: 12px 18px; border-radius: 18px; max-width: 70%; font-size: 15px; position: relative; }
        .msg-me { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 4px; }
        .msg-ot { align-self: flex-start; background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Ô nhập liệu */
        .chat-input-area { padding: 20px; background: #fff; display: flex; gap: 15px; border-top: 1px solid #eee; }
        #text-input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        #send-btn { background: #0084ff; color: #fff; border: none; padding: 0 25px; border-radius: 25px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>LƯỚT MẠNG THÔNG MINH-BÌNH YÊN BÊN MÌNH </h1>
    </header>

    <div class="video-grid">
        {% for v in videos %}
        <div class="video-card">
            <video controls preload="metadata" src="/static/{{ v.file }}"></video>
            <div class="video-title">{{ v.title }}</div>
        </div>
        {% endfor %}
    </div>

    <div id="chat-trigger" onclick="toggleChat(true)">💬</div>

    <div id="chat-overlay">
        <div id="chat-window">
            {% if username == advisor %}
            <div id="chat-sidebar">
                <div style="padding: 20px; font-weight: bold; background: #0084ff; color: #fff;">DANH SÁCH KHÁCH</div>
                {% for u in all_users %}
                <div class="user-tab" onclick="switchUser('{{ u }}', this)">{{ u }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <div class="chat-main">
                <div class="chat-header">
                    <b id="target-name">Đang kết nối...</b>
                    <span onclick="toggleChat(false)" style="cursor:pointer; font-size: 30px;">&times;</span>
                </div>
                <div id="message-display"></div>
                <div class="chat-input-area">
                    <input type="text" id="text-input" placeholder="Nhập tin nhắn..." onkeypress="handleEnter(event)">
                    <button id="send-btn" onclick="sendMessage()">GỬI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var socket = io();
        var myName = "{{ username }}";
        var advisor = "{{ advisor }}";
        var currentTarget = (myName === advisor) ? "" : advisor;

        // Tự động load khi vào trang
        socket.on('connect', function() {
            if (myName !== advisor) switchUser(advisor);
        });

        function toggleChat(show) {document.getElementById('chat-overlay').style.display = show ? 'flex' : 'none';
        }

        function switchUser(t, el) {
            currentTarget = t;
            if (el) {
                document.querySelectorAll('.user-tab').forEach(tab => tab.classList.remove('active'));
                el.classList.add('active');
            }
            document.getElementById('target-name').innerText = (myName === advisor) ? "Chat với: " + t : "Hỗ trợ Hoàng Gia";
            document.getElementById('message-display').innerHTML = "Đang tải lịch sử...";
            
            fetch('/get_history/' + t).then(r => r.json()).then(data => {
                document.getElementById('message-display').innerHTML = "";
                if (data.history) data.history.forEach(m => appendMsg(m));
            });
        }

        function appendMsg(d) {
            let div = document.createElement("div");
            div.className = "msg-bubble " + (d.user === myName ? "msg-me" : "msg-ot");
            div.innerText = d.msg;
            let box = document.getElementById("message-display");
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        socket.on('announce_message', function(d) {
            if ((d.user === myName && d.target === currentTarget) || (d.user === currentTarget && d.target === myName)) {
                appendMsg(d);
            }
        });

        function sendMessage() {
            let inp = document.getElementById("text-input");
            if (inp.value.trim() && currentTarget) {
                let d = { user: myName, target: currentTarget, msg: inp.value, file: null };
                socket.emit('message', d);
                appendMsg(d);
                inp.value = "";
            }
        }

        function handleEnter(e) { if (e.key === "Enter") sendMessage(); }
    </script>
</body>
</html>
